<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | Product Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --success: #4caf7d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    .nav {
      height: 66px;
      display: flex; align-items: center;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-inner {
      width: 100%; max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .nav-brand img {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--gold);
    }
    .nav-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .nav-links {
      display: flex; align-items: center; gap: 2px; list-style: none;
    }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 6px; transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface2); }
    .nav-right {
      display: flex; align-items: center; gap: 4px;
    }
    .nav-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none; border: none;
    }
    .nav-btn-outline {
      background: transparent;
      border: 1px solid var(--border-h);
      color: var(--muted);
    }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .nav-btn-gold { background: var(--gold); color: #080808; font-weight: 500; }
    .nav-btn-gold:hover { background: var(--gold-l); }
    .nav-cart {
      color: var(--muted); font-size: 0.95rem;
      padding: 7px 14px; border-radius: 6px;
      transition: all 0.2s; cursor: pointer; text-decoration: none;
    }
    .nav-cart:hover { color: var(--text); background: var(--surface2); }
    .nav-toggler {
      display: none; background: none;
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    /* PAGE LAYOUT */
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 2rem 80px;
    }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
    }
    .page-eyebrow::before {
      content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700; letter-spacing: -0.02em;
      color: var(--text); line-height: 1.1;
      margin-bottom: 48px;
    }
    .page-title em { font-style: italic; color: var(--gold); }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }

    /* LEFT: IMAGE SECTION */
    .img-section {
      display: flex;
      gap: 14px;
    }
    .thumbnails {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .thumb {
      width: 72px; height: 72px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border-h);
      cursor: pointer;
      transition: all 0.25s;
      opacity: 0.6;
    }
    .thumb:hover, .thumb.active { opacity: 1; border-color: var(--gold); }

    .main-img-wrap {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      aspect-ratio: 4/5;
      position: relative;
    }
    .main-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }
    .main-img-wrap:hover .main-img { transform: scale(1.03); }

    /* RIGHT: DETAILS SECTION */
    .detail-section {}

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem; font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text); line-height: 1.1;
      margin-bottom: 6px;
    }

    .product-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 600;
      color: var(--gold);
      margin-bottom: 28px;
    }

    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    .spec-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .spec-list li {
      display: flex; justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .spec-list li .spec-label {
      color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase;
      font-size: 0.72rem;
    }
    .spec-list li .spec-value {
      color: var(--text);
      font-weight: 400;
      text-align: right;
    }

    .desc-block {
      margin: 24px 0;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.9;
      font-weight: 300;
    }

    /* COLOR OPTIONS */
    .color-section { margin: 24px 0; }
    .color-label {
      font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .color-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .color-pill {
      padding: 8px 18px;
      border-radius: 6px;
      border: 1px solid var(--border-h);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s;
    }
    .color-pill:hover { border-color: var(--gold); color: var(--gold); }
    .color-pill.selected { border-color: var(--gold); background: var(--gold); color: #080808; }

    /* ACTION BUTTONS */
    .action-row {
      display: flex; gap: 12px; margin-top: 32px;
    }
    .btn-primary {
      flex: 1;
      background: var(--gold);
      color: #080808;
      border: none; border-radius: 6px;
      padding: 14px;
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-primary:hover { background: var(--gold-l); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      flex: 1;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border-h);
      border-radius: 6px;
      padding: 14px;
      font-size: 0.82rem; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* RESPONSE MSG */
    #responseMessage {
      margin-top: 16px;
      font-size: 0.82rem;
      text-align: center;
      min-height: 20px;
      border-radius: 6px;
      transition: all 0.3s;
    }
    #responseMessage.success { color: var(--success); }
    #responseMessage.error   { color: var(--danger); }

    /* SKELETON */
    .skeleton-block {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .skeleton-line {
      height: 14px; border-radius: 4px;
      background: var(--surface2); margin-bottom: 14px;
    }

    @media (max-width: 900px) {
      .product-grid { grid-template-columns: 1fr; gap: 36px; }
    }
    @media (max-width: 768px) {
      .nav-links, .nav-right { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column;
        position: fixed; inset: 66px 0 0 0;
        background: rgba(8,8,8,0.98);
        padding: 2rem; z-index: 199; gap: 6px;
      }
      .nav-links.open a { font-size: 1rem; padding: 12px 16px; }
      .nav-right.open {
        display: flex; flex-direction: column;
        position: fixed; top: 66px; left: 0; right: 0;
        padding: 0 2rem 2rem;
        background: rgba(8,8,8,0.98);
        z-index: 198; gap: 10px;
      }
      .nav-toggler { display: flex; }
    }
    @media (max-width: 600px) {
      .img-section { flex-direction: column-reverse; }
      .thumbnails { flex-direction: row; }
      .thumb { width: 56px; height: 56px; }
      .action-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="2_homepage.html">
        <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
        <span class="nav-brand-name">Cartinix</span>
      </a>

      <button class="nav-toggler" id="navToggler" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a href="2_homepage.html">Home</a></li>
        <li><a href="3_Allproducts.html">Shop</a></li>
        <li><a href="10_about.html">About</a></li>
        <li id="myOrdersLink" style="display:none;"><a href="9_myorders.html">My Orders</a></li>
      </ul>

      <div class="nav-right" id="navAuth"></div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-eyebrow">Timepiece Detail</div>
    <div class="page-title">The <em>craft</em> behind<br>every second</div>

    <div class="product-grid" id="productGrid">
      <div class="skeleton-block" style="aspect-ratio:4/5;"></div>
      <div>
        <div class="skeleton-line" style="width:70%;height:28px;margin-bottom:16px;background:var(--surface);border-radius:6px;"></div>
        <div class="skeleton-line" style="width:40%;height:20px;background:var(--surface);border-radius:6px;"></div>
      </div>
    </div>

    <div id="responseMessage"></div>
  </div>

  <script>
    // ── Shared auth check (same logic used across all pages) ──
    function isUserLoggedIn() {
      return !!(
        localStorage.getItem("token") ||
        localStorage.getItem("customerEmail") ||
        localStorage.getItem("adminEmail")
      );
    }

    function renderNavAuth() {
      const navAuth = document.getElementById("navAuth");
      const myOrdersLink = document.getElementById("myOrdersLink");
      const loggedIn = isUserLoggedIn();

      myOrdersLink.style.display = loggedIn ? "" : "none";

      if (loggedIn) {
        navAuth.innerHTML = `
          <a class="nav-cart" href="7_showcart.html" aria-label="Cart"><i class="fas fa-shopping-cart"></i></a>
          <button class="nav-btn nav-btn-outline" id="logoutBtn">Logout</button>
        `;
        document.getElementById("logoutBtn").addEventListener("click", () => {
          localStorage.clear();
          window.location.href = "1_Signin.html";
        });
      } else {
        navAuth.innerHTML = `
          <a class="nav-cart" href="7_showcart.html" aria-label="Cart"><i class="fas fa-shopping-cart"></i></a>
          <a href="1_Signin.html" class="nav-btn nav-btn-outline">Login</a>
          <a href="0_signup.html" class="nav-btn nav-btn-gold">Sign Up</a>
        `;
      }
    }

    function initMobileNav() {
      const navToggler = document.getElementById("navToggler");
      const navLinks = document.getElementById("navLinks");
      const navAuth = document.getElementById("navAuth");
      navToggler.addEventListener("click", () => {
        navLinks.classList.toggle("open");
        navAuth.classList.toggle("open");
      });
    }

    renderNavAuth();
    initMobileNav();

    // ── Product details ──
    const productid = localStorage.getItem("productid");
    const msgEl = document.getElementById("responseMessage");
    const grid = document.getElementById("productGrid");

    let currentImages = [];
    let msgTimer = null;

    function showMsg(text, type) {
      clearTimeout(msgTimer);
      msgEl.textContent = text;
      msgEl.className = type;
      msgTimer = setTimeout(() => { msgEl.textContent = ""; msgEl.className = ""; }, 2000);
    }

    if (!productid) {
      grid.innerHTML = "";
      showMsg("No product selected. Please choose a watch from the shop.", "error");
    } else {
      fetch(`http://localhost:8000/users/product-details?productid=${encodeURIComponent(productid)}`)
        .then(async res => {
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            showMsg(err.Error || "Failed to load product.", "error");
            grid.innerHTML = "";
            return;
          }
          return res.json();
        })
        .then(data => {
          if (!data) return;
          const d = data.details;
          currentImages = data.images || [];

          grid.innerHTML = `
            <div class="img-section">
              <div class="thumbnails" id="thumbnails"></div>
              <div class="main-img-wrap">
                <img class="main-img" id="mainImg" src="http://localhost:8000/photos/${currentImages[0]?.image_path}" alt="${d.title}" />
              </div>
            </div>

            <div class="detail-section">
              <div class="product-name">${d.title}</div>
              <div class="product-price">Rs ${Number(d.price).toLocaleString()}</div>

              <div class="divider"></div>

              <ul class="spec-list">
                <li><span class="spec-label">Brand</span><span class="spec-value">${d.brand}</span></li>
                <li><span class="spec-label">Category</span><span class="spec-value">${d.category}</span></li>
                <li><span class="spec-label">Material</span><span class="spec-value">${d.material}</span></li>
                <li><span class="spec-label">Stock</span><span class="spec-value">${d.stock} units</span></li>
              </ul>

              <div class="divider"></div>

              <p class="desc-block">${d.description}</p>

              <div class="color-section">
                <div class="color-label">Select Color</div>
                <div class="color-pills" id="colorPills"></div>
              </div>

              <div class="action-row">
                <button class="btn-primary" id="addtocart">Add to Cart</button>
                <button class="btn-secondary" id="buynow">Buy Now</button>
              </div>
            </div>
          `;

          // Clear any stale color selection from a previous product view
          localStorage.removeItem("color");

          const mainImg = document.getElementById("mainImg");
          const thumbsEl = document.getElementById("thumbnails");

          currentImages.forEach((img, i) => {
            const thumb = document.createElement("img");
            thumb.className = "thumb" + (i === 0 ? " active" : "");
            thumb.src = `http://localhost:8000/photos/${img.image_path}`;
            thumb.alt = d.title;
            thumb.addEventListener("click", () => {
              mainImg.src = `http://localhost:8000/photos/${img.image_path}`;
              document.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
              thumb.classList.add("active");
            });
            thumbsEl.appendChild(thumb);
          });

          const colorPills = document.getElementById("colorPills");
          (data.color || []).forEach((c, i) => {
            const pill = document.createElement("button");
            pill.className = "color-pill";
            pill.textContent = c.color_name;
            pill.addEventListener("click", () => {
              localStorage.setItem("color", c.color_name);
              document.querySelectorAll(".color-pill").forEach(p => p.classList.remove("selected"));
              pill.classList.add("selected");
              if (currentImages[i]) {
                mainImg.src = `http://localhost:8000/photos/${currentImages[i].image_path}`;
                document.querySelectorAll(".thumb").forEach((t, ti) => {
                  t.classList.toggle("active", ti === i);
                });
              }
            });
            colorPills.appendChild(pill);
          });

          function validateSelection() {
            const color = localStorage.getItem("color");
            if (!color) {
              showMsg("Please select a color first.", "error");
              return false;
            }
            if (!isUserLoggedIn()) {
              showMsg("Please log in to continue.", "error");
              return false;
            }
            return true;
          }

          document.getElementById("addtocart").addEventListener("click", (e) => {
            if (!validateSelection()) return;
            const btn = e.currentTarget;
            const product_sku = productid;
            const color = localStorage.getItem("color");
            const customer_email = localStorage.getItem("customerEmail");

            btn.disabled = true;
            fetch("http://localhost:8000/users/addtocart", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ product_sku, color, customer_email }),
            })
              .then(() => {
                localStorage.removeItem("color");
                document.querySelectorAll(".color-pill").forEach(p => p.classList.remove("selected"));
                showMsg("Added to cart successfully.", "success");
              })
              .catch(() => showMsg("Network error. Please try again.", "error"))
              .finally(() => { btn.disabled = false; });
          });

          document.getElementById("buynow").addEventListener("click", () => {
            if (!validateSelection()) return;
            window.location.href = "5_buynow.html";
          });
        })
        .catch(() => {
          grid.innerHTML = "";
          showMsg("Failed to load product details.", "error");
        });
    }
  </script>
</body>
</html>
