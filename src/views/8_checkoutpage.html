<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --success: #4caf7d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    .nav {
      height: 66px; display: flex; align-items: center;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-inner {
      width: 100%; max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-brand img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gold); }
    .nav-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem; font-weight: 700; color: var(--gold); letter-spacing: 0.05em;
    }
    .nav-links { display: flex; align-items: center; gap: 2px; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 6px; transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface2); }
    .nav-right { display: flex; align-items: center; gap: 4px; }
    .nav-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s; text-decoration: none; border: none;
    }
    .nav-btn-outline { background: transparent; border: 1px solid var(--border-h); color: var(--muted); }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .nav-btn-gold { background: var(--gold); color: #080808; font-weight: 500; }
    .nav-btn-gold:hover { background: var(--gold-l); }
    .nav-cart { color: var(--muted); font-size: 0.95rem; padding: 7px 14px; border-radius: 6px; transition: all 0.2s; text-decoration: none; }
    .nav-cart:hover { color: var(--text); background: var(--surface2); }

    /* PAGE */
    .page-wrap {
      max-width: 1100px; margin: 0 auto; padding: 60px 2rem 80px;
    }
    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
    }
    .page-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem); font-weight: 700;
      letter-spacing: -0.02em; color: var(--text); line-height: 1.1; margin-bottom: 48px;
    }
    .page-title em { font-style: italic; color: var(--gold); }

    /* CHECKOUT GRID */
    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      align-items: start;
    }

    /* FORM CARD */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
    }
    .section-eyebrow {
      font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-eyebrow::before { content: ''; width: 16px; height: 1px; background: var(--gold); opacity: 0.5; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px; font-weight: 400;
    }
    .field input {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border-h); border-radius: 8px;
      padding: 13px 16px; font-size: 0.92rem; color: var(--text);
      font-family: 'DM Sans', sans-serif; transition: all 0.25s; outline: none;
    }
    .field input::placeholder { color: var(--subtle); }
    .field input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,0.1); background: #1c1c1c; }
    .field input:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-order {
      width: 100%; background: var(--gold); color: #080808;
      border: none; border-radius: 6px; padding: 15px;
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.3s; margin-top: 8px;
    }
    .btn-order:hover { background: var(--gold-l); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(201,169,110,0.2); }

    #responseMessage {
      min-height: 20px; font-size: 0.82rem; text-align: center;
      margin-bottom: 12px; border-radius: 6px; transition: all 0.3s;
    }
    #responseMessage.success { color: var(--success); }
    #responseMessage.error   { color: var(--danger); }

    /* CART SUMMARY CARD */
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: sticky;
      top: 90px;
    }
    .summary-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold);
      display: flex; align-items: center; gap: 10px;
    }
    .summary-header::before { content: ''; width: 16px; height: 1px; background: var(--gold); opacity: 0.5; }

    .summary-items { padding: 0 24px; }

    .summary-item {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .summary-item:last-child { border-bottom: none; }
    .summary-item-img {
      width: 56px; height: 56px; object-fit: cover;
      border-radius: 7px; border: 1px solid var(--border-h); display: block;
    }
    .summary-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-weight: 700; color: var(--text);
      margin-bottom: 3px;
    }
    .summary-item-meta { font-size: 0.75rem; color: var(--muted); }
    .summary-item-subtotal {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem; font-weight: 600; color: var(--gold);
      white-space: nowrap;
    }

    .summary-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
    }
    .summary-row {
      display: flex; justify-content: space-between;
      padding: 8px 0; font-size: 0.84rem;
    }
    .summary-row .lbl { color: var(--muted); }
    .summary-row .val { color: var(--text); }
    .summary-row.total { padding-top: 14px; margin-top: 4px; border-top: 1px solid var(--border); }
    .summary-row.total .lbl {
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--text);
    }
    .summary-row.total .val {
      font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--gold);
    }

    .loading-text {
      padding: 24px; font-size: 0.82rem;
      color: var(--muted); text-align: center;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    @media (max-width: 820px) {
      .checkout-grid { grid-template-columns: 1fr; }
      .summary-card { position: static; }
      .nav-links { display: none; }
      .two-col { grid-template-columns: 1fr; }
      .form-card { padding: 22px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="2_homepage.html">
        <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
        <span class="nav-brand-name">Cartinix</span>
      </a>
      <ul class="nav-links">
        <li><a href="2_homepage.html">Home</a></li>
        <li><a href="3_Allproducts.html">Shop</a></li>
        <li><a href="10_about.html">About</a></li>
        <li><a href="9_myorders.html">My Orders</a></li>
      </ul>
      <div class="nav-right" id="navAuth">
        <a class="nav-cart" href="7_showcart.html" aria-label="Cart">
          <i class="fas fa-shopping-cart"></i>
        </a>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-eyebrow">Checkout</div>
    <div class="page-title">Confirm your <em>order</em></div>

    <div class="checkout-grid">

      <!-- LEFT: FORM -->
      <div class="form-card">
        <form id="checkoutForm">
          <div class="section-eyebrow">Shipping Information</div>

          <div class="two-col">
            <div class="field">
              <label for="name">Full Name</label>
              <input type="text" id="name" placeholder="John Doe" required />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="you@example.com" required />
            </div>
          </div>

          <div class="two-col">
            <div class="field">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" placeholder="+92 300 0000000" required />
            </div>
            <div class="field">
              <label for="address">Delivery Address</label>
              <input type="text" id="address" placeholder="Street, City, Province" required />
            </div>
          </div>

          <div class="divider"></div>

          <div class="section-eyebrow">Payment</div>

          <div class="field">
            <label for="paymentType">Payment Method</label>
            <input type="text" id="paymentType" value="Cash on Delivery (COD)" disabled />
          </div>

          <div id="responseMessage"></div>

          <button type="submit" class="btn-order">Place Order</button>
        </form>
      </div>

      <!-- RIGHT: CART SUMMARY -->
      <div class="summary-card">
        <div class="summary-header">Order Summary</div>
        <div class="summary-items" id="cartItems">
          <div class="loading-text">Loading items...</div>
        </div>
        <div class="summary-footer">
          <div class="summary-row">
            <span class="lbl">Shipping</span>
            <span class="val">Free</span>
          </div>
          <div class="summary-row">
            <span class="lbl">Payment</span>
            <span class="val">COD</span>
          </div>
          <div class="summary-row total">
            <span class="lbl">Total</span>
            <span class="val">Rs <span id="grandTotal">0</span></span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const navAuth = document.getElementById("navAuth");
    const customerEmail = localStorage.getItem("customerEmail");
    const adminEmail = localStorage.getItem("adminEmail");
    const isLoggedIn = customerEmail || adminEmail;

    if (isLoggedIn) {
      navAuth.innerHTML = `
        <a class="nav-cart" href="7_showcart.html" aria-label="Cart"><i class="fas fa-shopping-cart"></i></a>
        <button class="nav-btn nav-btn-outline" id="logoutBtn">Logout</button>
      `;
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "1_Signin.html";
      });
    } else {
      navAuth.innerHTML = `
        <a class="nav-cart" href="7_showcart.html" aria-label="Cart"><i class="fas fa-shopping-cart"></i></a>
        <a href="1_Signin.html" class="nav-btn nav-btn-outline">Login</a>
        <a href="0_signup.html" class="nav-btn nav-btn-gold">Sign Up</a>
      `;
    }

    const email = localStorage.getItem("customerEmail");
    const cartItemsEl = document.getElementById("cartItems");
    const grandTotalEl = document.getElementById("grandTotal");
    const msgEl = document.getElementById("responseMessage");

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = type;
      setTimeout(() => { msgEl.textContent = ""; msgEl.className = ""; }, 2500);
    }

    fetch(`http://localhost:8000/users/showcart?email=${email}`)
      .then(async res => {
        if (!res.ok) { const e = await res.json(); throw new Error(e.Error || "Failed"); }
        return res.json();
      })
      .then(data => {
        cartItemsEl.innerHTML = "";
        let total = 0;

        data.forEach(product => {
          const price = parseInt(product.price);
          const qty = product.quantity || 1;
          const itemTotal = price * qty;
          total += itemTotal;

          const item = document.createElement("div");
          item.className = "summary-item";
          item.innerHTML = `
            <img class="summary-item-img" src="http://localhost:8000/photos/${product.image_path}" alt="${product.title}" />
            <div>
              <div class="summary-item-name">${product.title}</div>
              <div class="summary-item-meta">Rs ${Number(price).toLocaleString()} &times; ${qty}</div>
            </div>
            <div class="summary-item-subtotal">Rs ${Number(itemTotal).toLocaleString()}</div>
          `;
          cartItemsEl.appendChild(item);
        });

        grandTotalEl.textContent = Number(total).toLocaleString();
      })
      .catch(err => {
        cartItemsEl.innerHTML = `<div class="loading-text">Failed to load cart.</div>`;
        showMsg(err.message, "error");
      });

    document.getElementById("checkoutForm").addEventListener("submit", e => {
      e.preventDefault();
      const name    = document.getElementById("name").value.trim();
      const phone   = document.getElementById("phone").value.trim();
      const address = document.getElementById("address").value.trim();

      fetch("http://localhost:8000/users/checkout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, phone, email, address })
      })
        .then(async res => {
          if (!res.ok) { const e = await res.json(); throw new Error(e.Error || "Order failed"); }
          return res.json();
        })
        .then(data => {
          localStorage.setItem("OrderId", data.order_id);
          showMsg("Order placed successfully!", "success");
          setTimeout(() => window.location.href = "6_orderslip.html", 1000);
        })
        .catch(err => showMsg(err.message || "Failed to place order.", "error"));
    });
  </script>
</body>
</html>
