<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | Shipping Label</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://raw.githack.com/eKoopmans/html2pdf/master/dist/html2pdf.bundle.js"></script>

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --success: #4caf7d;
      --info: #7ea1e0;
      --warn: #e0b355;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .dash-header {
      height: 66px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 2.5rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .dash-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .dash-brand img {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--gold);
    }
    .dash-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .dash-brand-tag {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-left: 8px;
      padding: 3px 10px; border: 1px solid var(--border-h); border-radius: 20px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .admin-email { font-size: 0.78rem; color: var(--muted); display: none; }
    .nav-btn-outline {
      background: transparent; border: 1px solid var(--border-h); color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .sidebar-toggler {
      display: none; background: none;
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    /* ── LAYOUT ── */
    .dashboard { display: flex; min-height: calc(100vh - 66px); }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 14px;
    }
    .sidebar a {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); text-decoration: none;
      padding: 11px 16px; margin-bottom: 4px;
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 400;
      transition: all 0.2s;
    }
    .sidebar a i { width: 16px; text-align: center; font-size: 0.85rem; }
    .sidebar a:hover { background: var(--surface2); color: var(--text); }
    .sidebar a.active {
      background: rgba(201,169,110,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.25);
    }

    .main-content {
      flex: 1; padding: 40px clamp(1.5rem, 4vw, 3rem) 80px;
      display: flex; flex-direction: column; align-items: center;
    }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
      align-self: flex-start;
    }
    .page-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 700; color: var(--text);
      margin-bottom: 8px;
      align-self: flex-start;
    }
    .page-sub {
      font-size: 0.84rem; color: var(--muted); font-weight: 300;
      margin-bottom: 32px;
      align-self: flex-start;
    }

    /* ── ALERT BANNER ── */
    .alert-banner {
      display: none;
      align-items: center; gap: 10px;
      font-size: 0.85rem;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      border: 1px solid var(--border-h);
      width: 100%; max-width: 600px;
    }
    .alert-banner.show { display: flex; }
    .alert-banner.success { color: var(--success); border-color: rgba(76,175,125,0.35); background: rgba(76,175,125,0.08); }
    .alert-banner.error   { color: var(--danger); border-color: rgba(224,85,85,0.35); background: rgba(224,85,85,0.08); }

    /* ── PRINTABLE LABEL (kept light/white for clean PDF output) ── */
    .label-container {
      width: 100%;
      max-width: 600px;
      background: #ffffff;
      color: #1a1a1a;
      padding: 30px 34px;
      border-radius: 12px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.35);
      page-break-inside: avoid;
      break-inside: avoid;
    }

    .label-container h2 {
      text-align: center;
      margin-bottom: 22px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .label-container .section {
      margin-bottom: 20px;
      page-break-inside: avoid;
      break-inside: avoid;
    }

    .label-container .section h4 {
      margin-bottom: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #b8935c;
      border-bottom: 1px solid #e5e1d8;
      padding-bottom: 6px;
    }

    .label-container .info-row {
      margin-bottom: 6px;
      font-size: 0.92rem;
      color: #333;
    }
    .label-container .info-row strong {
      color: #1a1a1a;
      font-weight: 600;
      min-width: 100px;
      display: inline-block;
    }

    .label-skeleton {
      height: 60px; border-radius: 8px;
      background: #f2f0eb; margin-bottom: 14px;
    }

    /* ── DOWNLOAD BUTTON ── */
    .label-buttons { margin-top: 28px; }
    .action-button {
      padding: 12px 26px;
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      background: rgba(201,169,110,0.1);
      color: var(--gold);
    }
    .action-button:hover:not(:disabled) { background: rgba(201,169,110,0.18); }
    .action-button:disabled { opacity: 0.5; cursor: not-allowed; }

    @media print {
      .dash-header, .sidebar, .label-buttons, .alert-banner,
      .page-eyebrow, .page-title, .page-sub { display: none !important; }
      body { background: #fff; }
      .main-content { padding: 0; }
      .label-container { box-shadow: none; border: none; }
    }

    @media (max-width: 900px) {
      .sidebar { position: fixed; top: 66px; left: 0; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform 0.25s; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggler { display: flex; }
      .main-content { padding: 28px 1.25rem 70px; }
    }
  </style>
</head>
<body>

  <div class="dash-header">
    <a class="dash-brand" href="2_homepage.html">
      <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
      <span class="dash-brand-name">Cartinix</span>
      <span class="dash-brand-tag">Admin</span>
    </a>
    <div class="header-right">
      <span class="admin-email" id="adminEmailLabel"></span>
      <button class="sidebar-toggler" id="sidebarToggler" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <button class="nav-btn-outline" id="logout">Logout</button>
    </div>
  </div>

  <div class="dashboard">

    <div class="sidebar" id="sidebar">
      <a href="11_admin.html"><i class="fas fa-gauge"></i> Dashboard</a>
      <a href="13_manageproduct.html"><i class="fas fa-boxes-stacked"></i> Manage Products</a>
      <a href="12_addproduct.html"><i class="fas fa-circle-plus"></i> Add Product</a>
      <a href="15_showorders.html"><i class="fas fa-receipt"></i> Check Orders</a>
      <a href="16_manageorder.html" class="active"><i class="fas fa-truck-fast"></i> Manage Orders</a>
      <a href="19_myincome.html"><i class="fas fa-sack-dollar"></i> My Income</a>
    </div>

    <div class="main-content">
      <div class="page-eyebrow">Fulfillment</div>
      <div class="page-title">Shipping Label</div>
      <div class="page-sub">Confirm the details below, then download the label for this order.</div>

      <div class="alert-banner" id="alertBanner"></div>

      <div class="label-container" id="label">
        <h2>Shipping Label</h2>

        <div id="labelBody">
          <div class="label-skeleton"></div>
          <div class="label-skeleton"></div>
          <div class="label-skeleton"></div>
        </div>
      </div>

      <div class="label-buttons">
        <button class="action-button" id="download" disabled>
          <i class="fas fa-download"></i> Download Label
        </button>
      </div>
    </div>

  </div>

  <script>
    // ── Admin auth guard ──
    const adminEmail = localStorage.getItem("adminEmail");
    if (!adminEmail) {
      window.location.href = "1_Signin.html";
    } else {
      const label = document.getElementById("adminEmailLabel");
      label.textContent = adminEmail;
      label.style.display = "inline";
    }

    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("adminEmail");
      window.location.href = "2_homepage.html";
    });

    document.getElementById("sidebarToggler").addEventListener("click", () => {
      document.getElementById("sidebar").classList.toggle("open");
    });

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    const API_BASE = "http://localhost:8000";
    const sku = localStorage.getItem("selectedorder");
    const orderId = localStorage.getItem("seletedorderid"); // kept as-is to match other admin pages
    const alertBanner = document.getElementById("alertBanner");
    const labelBody = document.getElementById("labelBody");
    const downloadBtn = document.getElementById("download");

    function showAlert(message, type = "error") {
      alertBanner.className = `alert-banner show ${type}`;
      alertBanner.innerHTML = `
        <i class="fas ${type === "success" ? "fa-circle-check" : "fa-triangle-exclamation"}"></i>
        <span>${escapeHtml(message)}</span>
      `;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    if (!orderId) {
      labelBody.innerHTML = "";
      showAlert("No order selected. Go back to Manage Orders and pick an order first.");
    } else {
      fetch(`${API_BASE}/admin/orderdetails?sku=${encodeURIComponent(sku || "")}&orderid=${encodeURIComponent(orderId)}`)
        .then(async res => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.err || data.Error || "Failed to load order details.");
          }
          return data;
        })
        .then(data => {
          if (!data || data.length === 0) {
            labelBody.innerHTML = "";
            showAlert("No order found.");
            return;
          }

          const order = data[0];
          const customer = order.customer || {};
          const items = order.items || [];

          let totalAmount = 0;
          let totalQuantity = 0;
          const skus = [];

          items.forEach(item => {
            totalAmount += item.price * item.quantity;
            totalQuantity += item.quantity;
            if (item.sku) skus.push(item.sku);
          });

          labelBody.innerHTML = `
            <div class="section">
              <h4>Customer Details</h4>
              <div class="info-row"><strong>Name:</strong> ${escapeHtml(customer.name)}</div>
              <div class="info-row"><strong>Address:</strong> ${escapeHtml(customer.address)}</div>
              <div class="info-row"><strong>Phone:</strong> ${escapeHtml(customer.phone)}</div>
              <div class="info-row"><strong>Email:</strong> ${escapeHtml(customer.email)}</div>
            </div>

            <div class="section">
              <h4>Sender Details</h4>
              <div class="info-row"><strong>Name:</strong> Cartinix</div>
              <div class="info-row"><strong>Address:</strong> 3/d 4/9 Nazimabad No 4</div>
              <div class="info-row"><strong>Phone:</strong> 0331-4745405</div>
              <div class="info-row"><strong>Email:</strong> cartinixoffical@gmail.com</div>
            </div>

            <div class="section">
              <h4>Order Info</h4>
              <div class="info-row"><strong>Order ID:</strong> ${escapeHtml(order.order_id)}</div>
              <div class="info-row"><strong>Product SKU:</strong> ${escapeHtml(skus.join(", ") || sku || "N/A")}</div>
              <div class="info-row"><strong>Quantity:</strong> ${totalQuantity}</div>
              <div class="info-row"><strong>Order Date:</strong> ${escapeHtml(order.order_date)}</div>
              <div class="info-row"><strong>Amount:</strong> Rs ${totalAmount.toLocaleString()}</div>
            </div>
          `;

          downloadBtn.disabled = false;
        })
        .catch(err => {
          labelBody.innerHTML = "";
          showAlert(err.message || "Something went wrong. Please try again.");
        });
    }

    downloadBtn.addEventListener("click", (e) => {
      e.preventDefault();
      const originalHTML = downloadBtn.innerHTML;
      downloadBtn.disabled = true;
      downloadBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Preparing…`;

      const element = document.getElementById("label");
      html2pdf()
        .set({
          margin: 0.5,
          filename: `shipping_label_${orderId || "order"}.pdf`,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, scrollY: 0 },
          jsPDF: { unit: "in", format: "letter", orientation: "portrait" },
          pagebreak: { mode: ["avoid-all", "css", "legacy"] }
        })
        .from(element)
        .save()
        .finally(() => {
          downloadBtn.disabled = false;
          downloadBtn.innerHTML = originalHTML;
        });
    });
  </script>

</body>
</html>
