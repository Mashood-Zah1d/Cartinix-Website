<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | My Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --success: #4caf7d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV — same pattern as the rest of the site */
    .nav {
      height: 66px;
      display: flex; align-items: center;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-inner {
      width: 100%; max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-brand img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gold); }
    .nav-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .nav-links { display: flex; align-items: center; gap: 2px; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 6px; transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--gold); background: transparent; }
    .nav-right { display: flex; align-items: center; gap: 4px; }
    .nav-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none; border: none;
    }
    .nav-btn-outline { background: transparent; border: 1px solid var(--border-h); color: var(--muted); }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .nav-btn-gold { background: var(--gold); color: #080808; font-weight: 500; }
    .nav-btn-gold:hover { background: var(--gold-l); }
    .nav-cart {
      color: var(--muted); font-size: 0.95rem;
      padding: 7px 14px; border-radius: 6px;
      transition: all 0.2s; cursor: pointer; text-decoration: none;
    }
    .nav-cart:hover { color: var(--text); background: var(--surface2); }
    .nav-toggler {
      display: none; background: none;
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    /* PAGE HEADER */
    .page-wrap { max-width: 900px; margin: 0 auto; padding: 60px 2rem 80px; }
    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
    }
    .page-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700; letter-spacing: -0.02em;
      color: var(--text); line-height: 1.1;
      margin-bottom: 48px;
    }
    .page-title em { font-style: italic; color: var(--gold); }

    /* ORDER CARDS */
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 22px;
      transition: border-color 0.3s ease;
    }
    .order-card:hover { border-color: var(--border-h); }

    .order-head {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      padding-bottom: 16px; margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .order-id {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 700;
      color: var(--text);
    }
    .order-status {
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border-h);
      color: var(--gold);
      background: rgba(201,169,110,0.08);
    }

    .order-item {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 0;
    }
    .order-item + .order-item { border-top: 1px solid var(--border); }
    .order-item img {
      width: 68px; height: 68px;
      object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border-h);
      flex-shrink: 0;
    }
    .order-item-body { flex: 1; min-width: 0; }
    .order-item-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
    }
    .order-item-meta { font-size: 0.8rem; color: var(--muted); }
    .order-item-sub {
      font-size: 0.82rem; color: var(--gold);
      font-weight: 500; white-space: nowrap;
    }

    /* SKELETON */
    .skeleton-order {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px; margin-bottom: 22px;
    }
    .skeleton-line { height: 14px; border-radius: 4px; background: var(--surface2); margin-bottom: 14px; }

    /* EMPTY / ERROR / GUEST STATES */
    .state-block {
      text-align: center;
      padding: 70px 2rem;
      border: 1px dashed var(--border-h);
      border-radius: 12px;
    }
    .state-icon {
      width: 52px; height: 52px; margin: 0 auto 20px;
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.2rem;
    }
    .state-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--text); margin-bottom: 8px;
    }
    .state-desc { font-size: 0.85rem; color: var(--muted); font-weight: 300; margin-bottom: 24px; }
    .state-block.error .state-icon { color: var(--danger); border-color: rgba(224,85,85,0.3); }

    .btn-gold-lg {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--gold); color: #080808;
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 13px 30px; border-radius: 4px;
      text-decoration: none; transition: all 0.3s;
      border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-gold-lg:hover { background: var(--gold-l); transform: translateY(-2px); }

    @media (max-width: 768px) {
      .nav-links, .nav-right { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column;
        position: fixed; inset: 66px 0 0 0;
        background: rgba(8,8,8,0.98);
        padding: 2rem; z-index: 199; gap: 6px;
      }
      .nav-links.open a { font-size: 1rem; padding: 12px 16px; }
      .nav-right.open {
        display: flex; flex-direction: column;
        position: fixed; top: 66px; left: 0; right: 0;
        padding: 0 2rem 2rem;
        background: rgba(8,8,8,0.98);
        z-index: 198; gap: 10px;
      }
      .nav-toggler { display: flex; }
      .order-item { flex-wrap: wrap; }
      .order-item-sub { margin-left: auto; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="2_homepage.html">
        <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
        <span class="nav-brand-name">Cartinix</span>
      </a>

      <button class="nav-toggler" id="navToggler" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a href="2_homepage.html">Home</a></li>
        <li><a href="3_Allproducts.html">Shop</a></li>
        <li><a href="10_about.html">About</a></li>
        <li id="myOrdersLink" style="display:none;"><a href="9_myorders.html" class="active">My Orders</a></li>
      </ul>

      <div class="nav-right" id="navAuth"></div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-eyebrow">Your Account</div>
    <div class="page-title">Order <em>history</em></div>

    <div id="ordersContainer">
      <div class="skeleton-order">
        <div class="skeleton-line" style="width:35%; height:20px;"></div>
        <div class="skeleton-line" style="width:100%; height:68px; margin-top:16px;"></div>
      </div>
      <div class="skeleton-order">
        <div class="skeleton-line" style="width:35%; height:20px;"></div>
        <div class="skeleton-line" style="width:100%; height:68px; margin-top:16px;"></div>
      </div>
    </div>
  </div>

  <script>
    // ── Shared auth check (same logic used across all pages) ──
    function isUserLoggedIn() {
      return !!(
        localStorage.getItem("token") ||
        localStorage.getItem("customerEmail") ||
        localStorage.getItem("adminEmail")
      );
    }

    function renderNavAuth() {
      const navAuth = document.getElementById("navAuth");
      const myOrdersLink = document.getElementById("myOrdersLink");
      const loggedIn = isUserLoggedIn();

      myOrdersLink.style.display = loggedIn ? "" : "none";

      if (loggedIn) {
        navAuth.innerHTML = `
          <a class="nav-cart" href="7_showcart.html" aria-label="Cart"><i class="fas fa-shopping-cart"></i></a>
          <button class="nav-btn nav-btn-outline" id="logoutBtn">Logout</button>
        `;
        document.getElementById("logoutBtn").addEventListener("click", () => {
          localStorage.clear();
          window.location.href = "1_Signin.html";
        });
      } else {
        navAuth.innerHTML = `
          <a class="nav-cart" href="7_showcart.html" aria-label="Cart"><i class="fas fa-shopping-cart"></i></a>
          <a href="1_Signin.html" class="nav-btn nav-btn-outline">Login</a>
          <a href="0_signup.html" class="nav-btn nav-btn-gold">Sign Up</a>
        `;
      }
    }

    function initMobileNav() {
      const navToggler = document.getElementById("navToggler");
      const navLinks = document.getElementById("navLinks");
      const navAuth = document.getElementById("navAuth");
      navToggler.addEventListener("click", () => {
        navLinks.classList.toggle("open");
        navAuth.classList.toggle("open");
      });
    }

    renderNavAuth();
    initMobileNav();

    // ── Small helper to avoid raw user/API text breaking the layout ──
    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function renderState({ icon, title, desc, error = false }) {
      container.innerHTML = `
        <div class="state-block ${error ? "error" : ""}">
          <div class="state-icon"><i class="fas ${icon}"></i></div>
          <div class="state-title">${title}</div>
          <div class="state-desc">${desc}</div>
          <a href="3_Allproducts.html" class="btn-gold-lg">
            Browse the Collection <i class="fas fa-arrow-right" style="font-size:0.7rem;"></i>
          </a>
        </div>
      `;
    }

    const container = document.getElementById("ordersContainer");
    const email = localStorage.getItem("customerEmail");

    if (!email) {
      renderState({
        icon: "fa-user-lock",
        title: "You're not logged in",
        desc: "Log in to your account to see your order history."
      });
    } else {
      fetch(`http://localhost:8000/users/myorders?email=${encodeURIComponent(email)}`)
        .then(async res => {
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.Error || "Failed to load your orders.");
          }
          return res.json();
        })
        .then(orders => {
          if (!orders || !orders.length) {
            renderState({
              icon: "fa-box-open",
              title: "No orders yet",
              desc: "Once you place an order, it will show up here."
            });
            return;
          }

          container.innerHTML = "";
          orders.forEach(order => {
            const card = document.createElement("div");
            card.className = "order-card";

            const itemsHTML = (order.items || []).map(item => `
              <div class="order-item">
                <img src="http://localhost:8000/photos/${item.image_path}" alt="${escapeHtml(item.title)}" loading="lazy" />
                <div class="order-item-body">
                  <div class="order-item-title">${escapeHtml(item.title)}</div>
                  <div class="order-item-meta">Qty ${item.quantity} &middot; PKR ${Number(item.price).toLocaleString()} each</div>
                </div>
                <div class="order-item-sub">PKR ${Number(item.price * item.quantity).toLocaleString()}</div>
              </div>
            `).join("");

            card.innerHTML = `
              <div class="order-head">
                <div class="order-id">Order #${escapeHtml(order.order_id)}</div>
                <div class="order-status">${escapeHtml(order.status || "Pending")}</div>
              </div>
              ${itemsHTML}
            `;
            container.appendChild(card);
          });
        })
        .catch(err => {
          renderState({
            icon: "fa-triangle-exclamation",
            title: "Something went wrong",
            desc: err.message || "Please try again in a moment.",
            error: true
          });
        });
    }
  </script>
</body>
</html>
