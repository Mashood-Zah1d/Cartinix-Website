<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | Edit Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --success: #4caf7d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .dash-header {
      height: 66px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 2.5rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .dash-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .dash-brand img {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--gold);
    }
    .dash-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .dash-brand-tag {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-left: 8px;
      padding: 3px 10px; border: 1px solid var(--border-h); border-radius: 20px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .admin-email { font-size: 0.78rem; color: var(--muted); display: none; }
    .nav-btn-outline {
      background: transparent; border: 1px solid var(--border-h); color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .sidebar-toggler {
      display: none; background: none;
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    /* ── LAYOUT ── */
    .dashboard { display: flex; min-height: calc(100vh - 66px); }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 14px;
    }
    .sidebar a {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); text-decoration: none;
      padding: 11px 16px; margin-bottom: 4px;
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 400;
      transition: all 0.2s;
    }
    .sidebar a i { width: 16px; text-align: center; font-size: 0.85rem; }
    .sidebar a:hover { background: var(--surface2); color: var(--text); }
    .sidebar a.active {
      background: rgba(201,169,110,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.25);
    }

    .main-content { flex: 1; padding: 40px clamp(1.5rem, 4vw, 3rem); }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
    }
    .page-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 700; color: var(--text);
      margin-bottom: 36px;
    }

    /* ── FORM ── */
    .form-container {
      max-width: 700px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px clamp(1.25rem, 3vw, 2.5rem);
      position: relative;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px; font-weight: 400;
    }
    .field input, .field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border-h);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      transition: all 0.25s;
      outline: none;
    }
    .field textarea { resize: vertical; min-height: 100px; }
    .field input::placeholder, .field textarea::placeholder { color: var(--subtle); }
    .field input:focus, .field textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
      background: #1c1c1c;
    }
    .field input:disabled {
      opacity: 0.55; cursor: not-allowed;
    }
    .sku-hint {
      font-size: 0.72rem; color: var(--subtle); margin-top: 6px;
    }

    .btn-gold-lg {
      width: 100%;
      background: var(--gold); color: #080808;
      border: none; border-radius: 8px;
      padding: 15px;
      font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-gold-lg:hover { background: var(--gold-l); transform: translateY(-1px); }
    .btn-gold-lg:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    #responseMessage {
      min-height: 24px;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 16px;
    }
    #responseMessage.success { color: var(--success); }
    #responseMessage.error   { color: var(--danger); }

    /* ── LOADING OVERLAY ── */
    .form-loading {
      position: absolute; inset: 0;
      background: rgba(17,17,17,0.85);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      font-size: 0.82rem; color: var(--muted);
      z-index: 5;
    }
    .form-loading i { color: var(--gold); font-size: 1.3rem; }

    /* ── EMPTY STATE (no productid) ── */
    .state-block {
      text-align: center; padding: 60px 2rem;
      border: 1px dashed var(--border-h); border-radius: 12px;
      max-width: 700px;
    }
    .state-icon {
      width: 48px; height: 48px; margin: 0 auto 16px;
      border: 1px solid rgba(201,169,110,0.25); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.1rem;
    }
    .state-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 6px;
    }
    .state-desc { font-size: 0.83rem; color: var(--muted); font-weight: 300; margin-bottom: 20px; }

    @media (max-width: 900px) {
      .sidebar { position: fixed; top: 66px; left: 0; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform 0.25s; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggler { display: flex; }
      .main-content { padding: 28px 1.25rem; }
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="dash-header">
    <a class="dash-brand" href="2_homepage.html">
      <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
      <span class="dash-brand-name">Cartinix</span>
      <span class="dash-brand-tag">Admin</span>
    </a>
    <div class="header-right">
      <span class="admin-email" id="adminEmailLabel"></span>
      <button class="sidebar-toggler" id="sidebarToggler" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <button class="nav-btn-outline" id="logout">Logout</button>
    </div>
  </div>

  <div class="dashboard">

    <div class="sidebar" id="sidebar">
      <a href="11_admin.html"><i class="fas fa-gauge"></i> Dashboard</a>
      <a href="13_manageproduct.html" class="active"><i class="fas fa-boxes-stacked"></i> Manage Products</a>
      <a href="12_addproduct.html"><i class="fas fa-circle-plus"></i> Add Product</a>
      <a href="15_showorders.html"><i class="fas fa-receipt"></i> Check Orders</a>
      <a href="16_manageorder.html"><i class="fas fa-truck-fast"></i> Manage Orders</a>
      <a href="19_myincome.html"><i class="fas fa-sack-dollar"></i> My Income</a>
    </div>

    <div class="main-content">
      <div class="page-eyebrow">Inventory</div>
      <div class="page-title">Edit Product</div>

      <div id="pageBody"></div>
    </div>

  </div>

  <script>
    // ── Admin auth guard ──
    const adminEmail = localStorage.getItem("adminEmail");
    if (!adminEmail) {
      window.location.href = "1_Signin.html";
    } else {
      const label = document.getElementById("adminEmailLabel");
      label.textContent = adminEmail;
      label.style.display = "inline";
    }

    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("adminEmail");
      window.location.href = "2_homepage.html";
    });

    document.getElementById("sidebarToggler").addEventListener("click", () => {
      document.getElementById("sidebar").classList.toggle("open");
    });

    const pageBody = document.getElementById("pageBody");
    const productid = localStorage.getItem("productid");

    if (!productid) {
      pageBody.innerHTML = `
        <div class="state-block">
          <div class="state-icon"><i class="fas fa-box-open"></i></div>
          <div class="state-title">No product selected</div>
          <div class="state-desc">Choose a product to edit from Manage Products.</div>
          <a href="13_manageproduct.html" class="btn-gold-lg" style="display:inline-block; width:auto; padding:12px 28px; text-decoration:none;">Go to Manage Products</a>
        </div>
      `;
    } else {
      pageBody.innerHTML = `
        <div class="form-container" id="formContainer">
          <div class="form-loading" id="formLoading">
            <i class="fas fa-circle-notch fa-spin"></i>
            <span>Loading product...</span>
          </div>
          <form id="productForm">
            <div class="form-row">
              <div class="field">
                <label for="sku">Product SKU</label>
                <input id="sku" type="text" name="sku" disabled />
                <div class="sku-hint">SKU can't be changed.</div>
              </div>
              <div class="field">
                <label for="title">Product Title</label>
                <input id="title" type="text" name="title" required />
              </div>
            </div>

            <div class="field">
              <label for="description">Description</label>
              <textarea id="description" name="description" required></textarea>
            </div>

            <div class="form-row">
              <div class="field">
                <label for="brand">Brand</label>
                <input id="brand" type="text" name="brand" />
              </div>
              <div class="field">
                <label for="category">Category</label>
                <input id="category" type="text" name="category" />
              </div>
            </div>

            <div class="field">
              <label for="material">Material</label>
              <input id="material" type="text" name="material" />
            </div>

            <button type="submit" class="btn-gold-lg" id="submitBtn">Update Product</button>
            <div id="responseMessage"></div>
          </form>
        </div>
      `;

      const form = document.getElementById("productForm");
      const formLoading = document.getElementById("formLoading");
      const submitBtn = document.getElementById("submitBtn");
      const msg = document.getElementById("responseMessage");

      const skuInput = document.getElementById("sku");
      const titleInput = document.getElementById("title");
      const descriptionInput = document.getElementById("description");
      const brandInput = document.getElementById("brand");
      const categoryInput = document.getElementById("category");
      const materialInput = document.getElementById("material");

      function showMsg(text, type) {
        msg.textContent = text;
        msg.className = type;
      }

      // Load current product details into the form
      fetch(`http://localhost:8000/admin/product-details?productid=${encodeURIComponent(productid)}`)
        .then(async res => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.Error || data.message || "Failed to load product.");
          return data;
        })
        .then(data => {
          const d = data.details;
          skuInput.value = d.sku;
          titleInput.value = d.title;
          descriptionInput.value = d.description;
          brandInput.value = d.brand;
          categoryInput.value = d.category;
          materialInput.value = d.material;
          formLoading.remove();
        })
        .catch(err => {
          formLoading.innerHTML = `<span style="color:var(--danger);">${err.message}</span>`;
        });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
          sku: skuInput.value,
          title: titleInput.value.trim(),
          description: descriptionInput.value.trim(),
          brand: brandInput.value.trim(),
          category: categoryInput.value.trim(),
          material: materialInput.value.trim(),
        };

        submitBtn.disabled = true;
        submitBtn.textContent = "Updating...";

        try {
          const res = await fetch("http://localhost:8000/admin/editproduct", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          // NOTE: the previous version called res.json() twice on the same
          // response (once inside the error check, once again after) which
          // throws "body stream already read". Reading it exactly once here.
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.Error || data.message || "Failed to update product.");

          showMsg(data.message || "Product updated successfully.", "success");
        } catch (err) {
          showMsg(err.message, "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Update Product";
        }
      });
    }
  </script>

</body>
</html>
