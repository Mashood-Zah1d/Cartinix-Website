<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --success: #4caf7d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .dash-header {
      height: 66px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 2.5rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .dash-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .dash-brand img {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--gold);
    }
    .dash-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .dash-brand-tag {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-left: 8px;
      padding: 3px 10px; border: 1px solid var(--border-h); border-radius: 20px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .admin-email {
      font-size: 0.78rem; color: var(--muted);
      display: none;
    }
    .nav-btn-outline {
      background: transparent;
      border: 1px solid var(--border-h);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .sidebar-toggler {
      display: none; background: none;
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    /* ── LAYOUT ── */
    .dashboard { display: flex; min-height: calc(100vh - 66px); }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 14px;
    }
    .sidebar a {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); text-decoration: none;
      padding: 11px 16px; margin-bottom: 4px;
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 400;
      transition: all 0.2s;
    }
    .sidebar a i { width: 16px; text-align: center; font-size: 0.85rem; }
    .sidebar a:hover { background: var(--surface2); color: var(--text); }
    .sidebar a.active {
      background: rgba(201,169,110,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.25);
    }

    .main-content { flex: 1; padding: 40px clamp(1.5rem, 4vw, 3rem); }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
    }
    .page-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 700; color: var(--text);
      margin-bottom: 36px;
    }

    /* ── PRODUCT ROWS ── */
    .product-list { display: flex; flex-direction: column; gap: 14px; }
    .product-row {
      display: flex; align-items: center; gap: 20px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.25s;
    }
    .product-row:hover { border-color: var(--gold); transform: translateX(4px); }
    .product-row img {
      width: 60px; height: 60px;
      object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border-h);
      flex-shrink: 0;
    }
    .product-details { flex: 1; min-width: 0; }
    .product-details h6 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
    }
    .product-meta {
      display: flex; flex-wrap: wrap; gap: 4px 16px;
      font-size: 0.78rem; color: var(--muted);
    }
    .product-meta strong { color: var(--text); font-weight: 500; }
    .stock-pill {
      font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border-h);
      color: var(--muted);
      flex-shrink: 0;
    }
    .stock-pill.low { color: var(--danger); border-color: rgba(224,85,85,0.35); }
    .stock-pill.ok { color: var(--success); border-color: rgba(76,175,125,0.35); }

    /* ── SKELETON ── */
    .skeleton-row {
      height: 92px; border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    /* ── EMPTY / ERROR STATES ── */
    .state-block {
      text-align: center;
      padding: 60px 2rem;
      border: 1px dashed var(--border-h);
      border-radius: 12px;
    }
    .state-icon {
      width: 48px; height: 48px; margin: 0 auto 16px;
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.1rem;
    }
    .state-block.error .state-icon { color: var(--danger); border-color: rgba(224,85,85,0.3); }
    .state-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-weight: 700;
      color: var(--text); margin-bottom: 6px;
    }
    .state-desc { font-size: 0.83rem; color: var(--muted); font-weight: 300; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .sidebar { position: fixed; top: 66px; left: 0; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform 0.25s; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggler { display: flex; }
      .main-content { padding: 28px 1.25rem; }
      .product-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <div class="dash-header">
    <a class="dash-brand" href="2_homepage.html">
      <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
      <span class="dash-brand-name">Cartinix</span>
      <span class="dash-brand-tag">Admin</span>
    </a>
    <div class="header-right">
      <span class="admin-email" id="adminEmailLabel"></span>
      <button class="sidebar-toggler" id="sidebarToggler" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <button class="nav-btn-outline" id="logout">Logout</button>
    </div>
  </div>

  <div class="dashboard">

    <div class="sidebar" id="sidebar">
      <a href="11_admin.html" class="active"><i class="fas fa-gauge"></i> Dashboard</a>
      <a href="13_manageproduct.html"><i class="fas fa-boxes-stacked"></i> Manage Products</a>
      <a href="12_addproduct.html"><i class="fas fa-circle-plus"></i> Add Product</a>
      <a href="15_showorders.html"><i class="fas fa-receipt"></i> Check Orders</a>
      <a href="16_manageorder.html"><i class="fas fa-truck-fast"></i> Manage Orders</a>
      <a href="19_myincome.html"><i class="fas fa-sack-dollar"></i> My Income</a>
    </div>

    <div class="main-content">
      <div class="page-eyebrow">Overview</div>
      <div class="page-title">Listed Products on the Store</div>

      <div class="product-list" id="productContainer">
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>
    </div>

  </div>

  <script>
    // ── Admin auth guard ──
    const adminEmail = localStorage.getItem("adminEmail");
    if (!adminEmail) {
      window.location.href = "1_Signin.html";
    } else {
      const label = document.getElementById("adminEmailLabel");
      label.textContent = adminEmail;
      label.style.display = "inline";
    }

    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("adminEmail");
      window.location.href = "2_homepage.html";
    });

    document.getElementById("sidebarToggler").addEventListener("click", () => {
      document.getElementById("sidebar").classList.toggle("open");
    });

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    const container = document.getElementById("productContainer");

    function renderState({ icon, title, desc, error = false }) {
      container.innerHTML = `
        <div class="state-block ${error ? "error" : ""}">
          <div class="state-icon"><i class="fas ${icon}"></i></div>
          <div class="state-title">${title}</div>
          <div class="state-desc">${desc}</div>
        </div>
      `;
    }

    fetch("http://localhost:8000/admin/details")
      .then(async res => {
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.Error || "Failed to load products.");
        }
        return res.json();
      })
      .then(data => {
        if (!data || !data.length) {
          renderState({
            icon: "fa-box-open",
            title: "No products listed yet",
            desc: "Add your first watch to see it appear here."
          });
          return;
        }

        container.innerHTML = "";
        data.forEach(product => {
          const stock = Number(product.stock) || 0;
          const stockClass = stock === 0 ? "low" : stock < 5 ? "low" : "ok";

          const row = document.createElement("div");
          row.className = "product-row";
          row.innerHTML = `
            <img src="http://localhost:8000/photos/${product.image_path}" alt="${escapeHtml(product.title)}" loading="lazy" />
            <div class="product-details">
              <h6>${escapeHtml(product.title)}</h6>
              <div class="product-meta">
                <span><strong>Brand:</strong> ${escapeHtml(product.brand)}</span>
                <span><strong>Price:</strong> Rs ${Number(product.price).toLocaleString()}</span>
              </div>
            </div>
            <div class="stock-pill ${stockClass}">${stock} in stock</div>
          `;
          container.appendChild(row);
        });
      })
      .catch(err => {
        renderState({
          icon: "fa-triangle-exclamation",
          title: "Something went wrong",
          desc: err.message || "Please try again in a moment.",
          error: true
        });
      });
  </script>
</body>
</html>
