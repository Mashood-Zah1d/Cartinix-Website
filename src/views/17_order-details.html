<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | Order Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --success: #4caf7d;
      --info: #7ea1e0;
      --warn: #e0b355;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .dash-header {
      height: 66px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 2.5rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .dash-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .dash-brand img {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--gold);
    }
    .dash-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .dash-brand-tag {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-left: 8px;
      padding: 3px 10px; border: 1px solid var(--border-h); border-radius: 20px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .admin-email { font-size: 0.78rem; color: var(--muted); display: none; }
    .nav-btn-outline {
      background: transparent; border: 1px solid var(--border-h); color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .sidebar-toggler {
      display: none; background: none;
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    /* ── LAYOUT ── */
    .dashboard { display: flex; min-height: calc(100vh - 66px); }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 14px;
    }
    .sidebar a {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); text-decoration: none;
      padding: 11px 16px; margin-bottom: 4px;
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 400;
      transition: all 0.2s;
    }
    .sidebar a i { width: 16px; text-align: center; font-size: 0.85rem; }
    .sidebar a:hover { background: var(--surface2); color: var(--text); }
    .sidebar a.active {
      background: rgba(201,169,110,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.25);
    }

    .main-content { flex: 1; padding: 40px clamp(1.5rem, 4vw, 3rem) 140px; max-width: 1000px; }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
    }
    .page-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5; }
    .page-title-row {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 8px;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 700; color: var(--text);
    }
    .status-pill {
      font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid var(--border-h);
    }
    .status-pill.pending   { color: var(--warn); border-color: rgba(224,179,85,0.35); background: rgba(224,179,85,0.08); }
    .status-pill.shipped   { color: var(--info); border-color: rgba(126,161,224,0.35); background: rgba(126,161,224,0.08); }
    .status-pill.delivered { color: var(--success); border-color: rgba(76,175,125,0.35); background: rgba(76,175,125,0.08); }
    .status-pill.other     { color: var(--muted); }

    .page-sub {
      font-size: 0.84rem; color: var(--muted); font-weight: 300;
      margin-bottom: 28px;
    }

    /* ── ALERT BANNER ── */
    .alert-banner {
      display: none;
      align-items: center; gap: 10px;
      font-size: 0.85rem;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      border: 1px solid var(--border-h);
    }
    .alert-banner.show { display: flex; }
    .alert-banner.success { color: var(--success); border-color: rgba(76,175,125,0.35); background: rgba(76,175,125,0.08); }
    .alert-banner.error   { color: var(--danger); border-color: rgba(224,85,85,0.35); background: rgba(224,85,85,0.08); }

    /* ── CARD ── */
    .card-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 24px;
    }
    .card-box h5 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 700;
      color: var(--gold);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px; margin-bottom: 14px;
    }
    .row-line {
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.87rem;
      color: var(--muted);
      display: flex; gap: 6px;
    }
    .row-line:last-child { border-bottom: none; }
    .row-line strong { color: var(--text); font-weight: 500; min-width: 90px; }

    /* ── PRODUCT GRID ── */
    .order-layout {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }
    .image-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      transition: border-color 0.2s;
    }
    .image-box:hover { border-color: var(--border-h); }
    .product-image {
      width: 100%; height: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 14px;
      border: 1px solid var(--border-h);
    }
    .image-box p {
      font-size: 0.82rem; color: var(--muted);
      padding: 3px 0;
    }
    .image-box p strong { color: var(--text); font-weight: 500; }
    .image-box .item-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--text); margin-bottom: 6px;
    }

    /* ── TOTAL ── */
    .total-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.95rem;
    }
    .total-row .amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700; color: var(--gold);
    }

    /* ── ACTION BUTTONS ── */
    .button-wrapper {
      position: fixed;
      bottom: 30px;
      right: clamp(1.5rem, 4vw, 3rem);
      display: flex;
      gap: 12px;
      z-index: 50;
    }
    .action-button {
      padding: 12px 24px;
      border: 1px solid var(--border-h);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }
    .action-button.ship { color: var(--info); border-color: rgba(126,161,224,0.35); }
    .action-button.ship:hover:not(:disabled) { background: rgba(126,161,224,0.1); }
    .action-button.delivered { color: var(--success); border-color: rgba(76,175,125,0.35); }
    .action-button.delivered:hover:not(:disabled) { background: rgba(76,175,125,0.1); }
    .action-button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── SKELETON / STATE ── */
    .skeleton-block { height: 120px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); margin-bottom: 24px; }
    .state-block {
      text-align: center; padding: 60px 2rem;
      border: 1px dashed var(--border-h); border-radius: 12px;
    }
    .state-icon {
      width: 48px; height: 48px; margin: 0 auto 16px;
      border: 1px solid rgba(201,169,110,0.25); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.1rem;
    }
    .state-block.error .state-icon { color: var(--danger); border-color: rgba(224,85,85,0.3); }
    .state-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 6px;
    }
    .state-desc { font-size: 0.83rem; color: var(--muted); font-weight: 300; }

    @media (max-width: 900px) {
      .sidebar { position: fixed; top: 66px; left: 0; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform 0.25s; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggler { display: flex; }
      .main-content { padding: 28px 1.25rem 130px; }
    }
    @media (max-width: 480px) {
      .button-wrapper { flex-direction: column; }
      .action-button { justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="dash-header">
    <a class="dash-brand" href="2_homepage.html">
      <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
      <span class="dash-brand-name">Cartinix</span>
      <span class="dash-brand-tag">Admin</span>
    </a>
    <div class="header-right">
      <span class="admin-email" id="adminEmailLabel"></span>
      <button class="sidebar-toggler" id="sidebarToggler" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <button class="nav-btn-outline" id="logout">Logout</button>
    </div>
  </div>

  <div class="dashboard">

    <div class="sidebar" id="sidebar">
      <a href="11_admin.html"><i class="fas fa-gauge"></i> Dashboard</a>
      <a href="13_manageproduct.html"><i class="fas fa-boxes-stacked"></i> Manage Products</a>
      <a href="12_addproduct.html"><i class="fas fa-circle-plus"></i> Add Product</a>
      <a href="15_showorders.html"><i class="fas fa-receipt"></i> Check Orders</a>
      <a href="16_manageorder.html" class="active"><i class="fas fa-truck-fast"></i> Manage Orders</a>
      <a href="19_myincome.html"><i class="fas fa-sack-dollar"></i> My Income</a>
    </div>

    <div class="main-content">
      <div class="page-eyebrow">Orders</div>
      <div class="page-title-row">
        <div class="page-title" id="pageTitle">Order Details</div>
        <div class="status-pill" id="statusPill" style="display:none;"></div>
      </div>
      <div class="page-sub">Review customer and item details, then update the order status.</div>

      <div class="alert-banner" id="alertBanner"></div>

      <div id="content">
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
      </div>
    </div>

  </div>

  <div class="button-wrapper" id="actionButtons" style="display:none;">
    <button class="action-button ship" id="shipBtn"><i class="fas fa-truck"></i> Ship Order</button>
    <button class="action-button delivered" id="deliverBtn"><i class="fas fa-box-check"></i> Delivered</button>
  </div>

  <script>
    // ── Admin auth guard ──
    const adminEmail = localStorage.getItem("adminEmail");
    if (!adminEmail) {
      window.location.href = "1_Signin.html";
    } else {
      const label = document.getElementById("adminEmailLabel");
      label.textContent = adminEmail;
      label.style.display = "inline";
    }

    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("adminEmail");
      window.location.href = "2_homepage.html";
    });

    document.getElementById("sidebarToggler").addEventListener("click", () => {
      document.getElementById("sidebar").classList.toggle("open");
    });

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    const API_BASE = "http://localhost:8000";
    const orderId = localStorage.getItem("seletedorderid"); // kept as-is intentionally (see note below)
    const content = document.getElementById("content");
    const alertBanner = document.getElementById("alertBanner");
    const actionButtons = document.getElementById("actionButtons");
    const shipBtn = document.getElementById("shipBtn");
    const deliverBtn = document.getElementById("deliverBtn");
    const statusPill = document.getElementById("statusPill");

    // NOTE: localStorage key "seletedorderid" (typo) is kept exactly as the
    // previous page (16_manageorder.html) writes it, so this page still
    // reads the correct value. Rename both together in one pass if desired.

    function showAlert(message, type = "success") {
      alertBanner.className = `alert-banner show ${type}`;
      alertBanner.innerHTML = `
        <i class="fas ${type === "success" ? "fa-circle-check" : "fa-triangle-exclamation"}"></i>
        <span>${escapeHtml(message)}</span>
      `;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderState({ icon, title, desc, error = false }) {
      content.innerHTML = `
        <div class="state-block ${error ? "error" : ""}">
          <div class="state-icon"><i class="fas ${icon}"></i></div>
          <div class="state-title">${title}</div>
          <div class="state-desc">${desc}</div>
        </div>
      `;
    }

    function statusClass(status) {
      const s = (status || "pending").toLowerCase();
      return ["pending", "shipped", "delivered"].includes(s) ? s : "other";
    }

    function setStatusPill(status) {
      statusPill.style.display = "inline-block";
      statusPill.className = `status-pill ${statusClass(status)}`;
      statusPill.textContent = status || "Pending";
    }

    // ── Shared handler for ship / deliver actions (was duplicated before) ──
    async function updateOrderStatus({ endpoint, method = "PUT", button, successMessage, redirectTo }) {
      const originalHTML = button.innerHTML;
      shipBtn.disabled = true;
      deliverBtn.disabled = true;
      button.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Updating…`;

      try {
        const res = await fetch(`${API_BASE}${endpoint}`, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ orderid: orderId })
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.Error || data.err || "Something went wrong. Please try again.");
        }

        showAlert(data.message || successMessage, "success");
        if (redirectTo) {
          setTimeout(() => { window.location.href = redirectTo; }, 700);
        }
      } catch (err) {
        showAlert(err.message, "error");
      } finally {
        shipBtn.disabled = false;
        deliverBtn.disabled = false;
        button.innerHTML = originalHTML;
      }
    }

    shipBtn.addEventListener("click", () => {
      updateOrderStatus({
        endpoint: "/admin/ship",
        button: shipBtn,
        successMessage: "Order marked as shipped.",
        redirectTo: "18_shippinglabel.html"
      });
    });

    deliverBtn.addEventListener("click", () => {
      updateOrderStatus({
        endpoint: "/admin/deliver",
        button: deliverBtn,
        successMessage: "Order marked as delivered."
      });
    });

    function renderOrder(order) {
      const { customer = {}, items = [] } = order;
      const total = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      const itemsHTML = items.map(item => `
        <div class="image-box">
          <img src="${API_BASE}/photos/${item.image_path}" alt="${escapeHtml(item.title)}" class="product-image" loading="lazy" />
          <div class="item-title">${escapeHtml(item.title)}</div>
          <p><strong>Brand:</strong> ${escapeHtml(item.brand || "N/A")}</p>
          <p><strong>Qty:</strong> ${item.quantity}</p>
          <p><strong>Price:</strong> Rs ${Number(item.price).toLocaleString()}</p>
          <p><strong>Subtotal:</strong> Rs ${Number(item.price * item.quantity).toLocaleString()}</p>
        </div>
      `).join("");

      content.innerHTML = `
        <div class="card-box">
          <h5>Customer Details</h5>
          <div class="row-line"><strong>Name</strong> <span>${escapeHtml(customer.name)}</span></div>
          <div class="row-line"><strong>Address</strong> <span>${escapeHtml(customer.address)}</span></div>
          <div class="row-line"><strong>Phone</strong> <span>${escapeHtml(customer.phone)}</span></div>
          <div class="row-line"><strong>Email</strong> <span>${escapeHtml(customer.email)}</span></div>
        </div>

        <div class="order-layout">${itemsHTML}</div>

        <div class="card-box">
          <div class="total-row">
            <span>Order Total (${items.length} item${items.length === 1 ? "" : "s"})</span>
            <span class="amount">Rs ${total.toLocaleString()}</span>
          </div>
        </div>
      `;

      setStatusPill(order.status);
      document.getElementById("pageTitle").textContent = `Order #${order.order_id}`;
      actionButtons.style.display = "flex";
    }

    if (!orderId) {
      renderState({
        icon: "fa-triangle-exclamation",
        title: "No order selected",
        desc: "Go back to Manage Orders and pick an order to view.",
        error: true
      });
    } else {
      fetch(`${API_BASE}/admin/orderdetails?orderid=${encodeURIComponent(orderId)}`)
        .then(async res => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data || data.Error) {
            throw new Error(data?.Error || "Failed to load order details.");
          }
          return data;
        })
        .then(data => {
          const order = Array.isArray(data) ? data[0] : data;
          if (!order) {
            renderState({
              icon: "fa-circle-info",
              title: "No data found",
              desc: "This order could not be found."
            });
            return;
          }
          renderOrder(order);
        })
        .catch(err => {
          renderState({
            icon: "fa-triangle-exclamation",
            title: "Something went wrong",
            desc: err.message || "Please try again in a moment.",
            error: true
          });
        });
    }
  </script>

</body>
</html>
