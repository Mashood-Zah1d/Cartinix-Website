<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | Check Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --success: #4caf7d;
      --info: #7ea1e0;
      --warn: #e0b355;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .dash-header {
      height: 66px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 2.5rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .dash-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .dash-brand img {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--gold);
    }
    .dash-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .dash-brand-tag {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-left: 8px;
      padding: 3px 10px; border: 1px solid var(--border-h); border-radius: 20px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .admin-email { font-size: 0.78rem; color: var(--muted); display: none; }
    .nav-btn-outline {
      background: transparent; border: 1px solid var(--border-h); color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .sidebar-toggler {
      display: none; background: none;
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    /* ── LAYOUT ── */
    .dashboard { display: flex; min-height: calc(100vh - 66px); }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 14px;
    }
    .sidebar a {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); text-decoration: none;
      padding: 11px 16px; margin-bottom: 4px;
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 400;
      transition: all 0.2s;
    }
    .sidebar a i { width: 16px; text-align: center; font-size: 0.85rem; }
    .sidebar a:hover { background: var(--surface2); color: var(--text); }
    .sidebar a.active {
      background: rgba(201,169,110,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.25);
    }

    .main-content { flex: 1; padding: 40px clamp(1.5rem, 4vw, 3rem); }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
    }
    .page-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 700; color: var(--text);
      margin-bottom: 28px;
    }

    /* ── STAT CARDS ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stat-card:hover { border-color: var(--border-h); transform: translateY(-2px); }
    .stat-card.active { border-color: var(--gold); background: rgba(201,169,110,0.06); }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .stat-icon.all      { color: var(--gold); background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.25); }
    .stat-icon.pending  { color: var(--warn); background: rgba(224,179,85,0.1); border: 1px solid rgba(224,179,85,0.25); }
    .stat-icon.shipped  { color: var(--info); background: rgba(126,161,224,0.1); border: 1px solid rgba(126,161,224,0.25); }
    .stat-icon.delivered{ color: var(--success); background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.25); }
    .stat-label { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; color: var(--text); }

    /* ── ORDER CARDS ── */
    .order-list { display: flex; flex-direction: column; gap: 18px; }
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
    }
    .order-head {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      padding-bottom: 14px; margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .order-id {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 700; color: var(--text);
    }
    .order-head-right { display: flex; align-items: center; gap: 14px; }
    .order-total { font-size: 0.82rem; color: var(--muted); }
    .order-total strong { color: var(--gold); font-weight: 600; }
    .status-pill {
      font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border-h);
    }
    .status-pill.pending   { color: var(--warn); border-color: rgba(224,179,85,0.35); background: rgba(224,179,85,0.08); }
    .status-pill.shipped   { color: var(--info); border-color: rgba(126,161,224,0.35); background: rgba(126,161,224,0.08); }
    .status-pill.delivered { color: var(--success); border-color: rgba(76,175,125,0.35); background: rgba(76,175,125,0.08); }
    .status-pill.other     { color: var(--muted); }

    .order-item { display: flex; align-items: center; gap: 16px; padding: 10px 0; }
    .order-item + .order-item { border-top: 1px solid var(--border); }
    .order-item img {
      width: 64px; height: 64px; object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border-h); flex-shrink: 0;
    }
    .order-item-body { flex: 1; min-width: 0; }
    .order-item-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.02rem; font-weight: 700; color: var(--text); margin-bottom: 3px;
    }
    .order-item-meta { font-size: 0.79rem; color: var(--muted); }
    .order-item-sub { font-size: 0.82rem; color: var(--gold); font-weight: 500; white-space: nowrap; }

    /* ── SEARCH + FILTER TABS ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .status-filter { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border-h); color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 20px;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--muted); }
    .filter-btn.active { background: var(--gold); color: #080808; border-color: var(--gold); }
    .filter-count {
      font-size: 0.68rem; padding: 1px 7px; border-radius: 10px;
      background: rgba(255,255,255,0.08);
    }
    .filter-btn.active .filter-count { background: rgba(0,0,0,0.15); }

    .search-box { position: relative; }
    .search-box i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.8rem;
    }
    .search-box input {
      background: var(--surface); border: 1px solid var(--border-h); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      padding: 9px 14px 9px 36px; border-radius: 20px;
      outline: none; min-width: 220px;
    }
    .search-box input:focus { border-color: var(--gold); }
    .search-box input::placeholder { color: var(--subtle); }

    /* ── SKELETON / EMPTY / ERROR ── */
    .skeleton-order { height: 140px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); }
    .state-block {
      text-align: center; padding: 60px 2rem;
      border: 1px dashed var(--border-h); border-radius: 12px;
    }
    .state-icon {
      width: 48px; height: 48px; margin: 0 auto 16px;
      border: 1px solid rgba(201,169,110,0.25); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.1rem;
    }
    .state-block.error .state-icon { color: var(--danger); border-color: rgba(224,85,85,0.3); }
    .state-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 6px;
    }
    .state-desc { font-size: 0.83rem; color: var(--muted); font-weight: 300; }

    @media (max-width: 900px) {
      .sidebar { position: fixed; top: 66px; left: 0; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform 0.25s; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggler { display: flex; }
      .main-content { padding: 28px 1.25rem; }
      .search-box input { min-width: 0; width: 100%; }
      .toolbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <div class="dash-header">
    <a class="dash-brand" href="2_homepage.html">
      <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
      <span class="dash-brand-name">Cartinix</span>
      <span class="dash-brand-tag">Admin</span>
    </a>
    <div class="header-right">
      <span class="admin-email" id="adminEmailLabel"></span>
      <button class="sidebar-toggler" id="sidebarToggler" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <button class="nav-btn-outline" id="logout">Logout</button>
    </div>
  </div>

  <div class="dashboard">

    <div class="sidebar" id="sidebar">
      <a href="11_admin.html"><i class="fas fa-gauge"></i> Dashboard</a>
      <a href="13_manageproduct.html"><i class="fas fa-boxes-stacked"></i> Manage Products</a>
      <a href="12_addproduct.html"><i class="fas fa-circle-plus"></i> Add Product</a>
      <a href="15_showorders.html" class="active"><i class="fas fa-receipt"></i> Check Orders</a>
      <a href="16_manageorder.html"><i class="fas fa-truck-fast"></i> Manage Orders</a>
      <a href="19_myincome.html"><i class="fas fa-sack-dollar"></i> My Income</a>
    </div>

    <div class="main-content">
      <div class="page-eyebrow">Orders</div>
      <div class="page-title">All Orders</div>

      <div class="stat-grid" id="statGrid" style="display:none;">
        <div class="stat-card active" data-status="all">
          <div class="stat-icon all"><i class="fas fa-layer-group"></i></div>
          <div>
            <div class="stat-label">Total</div>
            <div class="stat-value" id="countAll">0</div>
          </div>
        </div>
        <div class="stat-card" data-status="pending">
          <div class="stat-icon pending"><i class="fas fa-hourglass-half"></i></div>
          <div>
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="countPending">0</div>
          </div>
        </div>
        <div class="stat-card" data-status="shipped">
          <div class="stat-icon shipped"><i class="fas fa-truck-fast"></i></div>
          <div>
            <div class="stat-label">Shipped</div>
            <div class="stat-value" id="countShipped">0</div>
          </div>
        </div>
        <div class="stat-card" data-status="delivered">
          <div class="stat-icon delivered"><i class="fas fa-box-check"></i></div>
          <div>
            <div class="stat-label">Delivered</div>
            <div class="stat-value" id="countDelivered">0</div>
          </div>
        </div>
      </div>

      <div class="toolbar">
        <div class="status-filter" id="statusFilter" style="display:none;">
          <button class="filter-btn active" data-status="all">All <span class="filter-count" id="badgeAll">0</span></button>
          <button class="filter-btn" data-status="pending">Pending <span class="filter-count" id="badgePending">0</span></button>
          <button class="filter-btn" data-status="shipped">Shipped <span class="filter-count" id="badgeShipped">0</span></button>
          <button class="filter-btn" data-status="delivered">Delivered <span class="filter-count" id="badgeDelivered">0</span></button>
        </div>
        <div class="search-box" id="searchBox" style="display:none;">
          <i class="fas fa-magnifying-glass"></i>
          <input type="text" id="searchInput" placeholder="Search order ID or item…" />
        </div>
      </div>

      <div class="order-list" id="orderList">
        <div class="skeleton-order"></div>
        <div class="skeleton-order"></div>
      </div>
    </div>

  </div>

  <script>
    // ── Admin auth guard ──
    const adminEmail = localStorage.getItem("adminEmail");
    if (!adminEmail) {
      window.location.href = "1_Signin.html";
    } else {
      const label = document.getElementById("adminEmailLabel");
      label.textContent = adminEmail;
      label.style.display = "inline";
    }

    // Bind logout immediately — previously this was only wired up inside the
    // fetch's success handler, so a failed request left the button dead.
    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("adminEmail");
      window.location.href = "2_homepage.html";
    });

    document.getElementById("sidebarToggler").addEventListener("click", () => {
      document.getElementById("sidebar").classList.toggle("open");
    });

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    const API_BASE = "http://localhost:8000";
    const orderList = document.getElementById("orderList");
    const statusFilter = document.getElementById("statusFilter");
    const statGrid = document.getElementById("statGrid");
    const searchBox = document.getElementById("searchBox");
    const searchInput = document.getElementById("searchInput");

    function renderState({ icon, title, desc, error = false }) {
      orderList.innerHTML = `
        <div class="state-block ${error ? "error" : ""}">
          <div class="state-icon"><i class="fas ${icon}"></i></div>
          <div class="state-title">${title}</div>
          <div class="state-desc">${desc}</div>
        </div>
      `;
    }

    function statusClass(status) {
      const s = (status || "pending").toLowerCase();
      return ["pending", "shipped", "delivered"].includes(s) ? s : "other";
    }

    function renderOrders(orders) {
      if (!orders.length) {
        renderState({
          icon: "fa-receipt",
          title: "No orders found",
          desc: "There's nothing to show for this filter or search."
        });
        return;
      }

      orderList.innerHTML = orders.map(order => {
        const items = order.items || [];
        const orderTotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0);

        const itemsHTML = items.map(item => `
          <div class="order-item">
            <img src="${API_BASE}/photos/${item.image_path}" alt="${escapeHtml(item.title)}" loading="lazy" />
            <div class="order-item-body">
              <div class="order-item-title">${escapeHtml(item.title)}</div>
              <div class="order-item-meta">
                Brand: ${escapeHtml(item.brand || "N/A")} &middot; Qty ${item.quantity} &middot; Rs ${Number(item.price).toLocaleString()} each
              </div>
            </div>
            <div class="order-item-sub">Rs ${Number(item.price * item.quantity).toLocaleString()}</div>
          </div>
        `).join("");

        return `
          <div class="order-card">
            <div class="order-head">
              <div class="order-id">Order #${escapeHtml(order.order_id)}</div>
              <div class="order-head-right">
                <div class="order-total">Total <strong>Rs ${orderTotal.toLocaleString()}</strong></div>
                <div class="status-pill ${statusClass(order.status)}">${escapeHtml(order.status || "Pending")}</div>
              </div>
            </div>
            ${itemsHTML}
          </div>
        `;
      }).join("");
    }

    function computeCounts(orders) {
      const counts = { all: orders.length, pending: 0, shipped: 0, delivered: 0 };
      orders.forEach(o => {
        const s = (o.status || "pending").toLowerCase();
        if (counts[s] !== undefined) counts[s]++;
      });
      return counts;
    }

    function renderCounts(counts) {
      document.getElementById("countAll").textContent = counts.all.toLocaleString();
      document.getElementById("countPending").textContent = counts.pending.toLocaleString();
      document.getElementById("countShipped").textContent = counts.shipped.toLocaleString();
      document.getElementById("countDelivered").textContent = counts.delivered.toLocaleString();

      document.getElementById("badgeAll").textContent = counts.all.toLocaleString();
      document.getElementById("badgePending").textContent = counts.pending.toLocaleString();
      document.getElementById("badgeShipped").textContent = counts.shipped.toLocaleString();
      document.getElementById("badgeDelivered").textContent = counts.delivered.toLocaleString();
    }

    let allOrders = [];
    let currentStatus = "all";

    function applyFilters() {
      const query = searchInput.value.trim().toLowerCase();

      let filtered = currentStatus === "all"
        ? allOrders
        : allOrders.filter(o => (o.status || "pending").toLowerCase() === currentStatus);

      if (query) {
        filtered = filtered.filter(o => {
          const idMatch = String(o.order_id).toLowerCase().includes(query);
          const itemMatch = (o.items || []).some(item => (item.title || "").toLowerCase().includes(query));
          return idMatch || itemMatch;
        });
      }

      renderOrders(filtered);
    }

    function setActiveStatus(status) {
      currentStatus = status;

      statusFilter.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.status === status));
      statGrid.querySelectorAll(".stat-card").forEach(c => c.classList.toggle("active", c.dataset.status === status));

      applyFilters();
    }

    fetch(`${API_BASE}/admin/getorder`)
      .then(async res => {
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.Error || data.err || "Failed to load orders.");
        return data;
      })
      .then(data => {
        allOrders = Array.isArray(data) ? data : [];

        if (allOrders.length) {
          statGrid.style.display = "grid";
          statusFilter.style.display = "flex";
          searchBox.style.display = "block";
        }

        renderCounts(computeCounts(allOrders));
        applyFilters();
      })
      .catch(err => {
        renderState({
          icon: "fa-triangle-exclamation",
          title: "Something went wrong",
          desc: err.message || "Please try again in a moment.",
          error: true
        });
      });

    statusFilter.addEventListener("click", (e) => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;
      setActiveStatus(btn.dataset.status);
    });

    statGrid.addEventListener("click", (e) => {
      const card = e.target.closest(".stat-card");
      if (!card) return;
      setActiveStatus(card.dataset.status);
    });

    let searchDebounce;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(applyFilters, 200);
    });
  </script>

</body>
</html>
