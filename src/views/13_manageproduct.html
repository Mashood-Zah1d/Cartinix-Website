<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinix | Manage Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.16);
      --gold: #c9a96e;
      --gold-l: #e2c99a;
      --text: #ede9e0;
      --muted: #7a7268;
      --subtle: #3f3b35;
      --danger: #e05555;
      --danger-l: #f27b7b;
      --success: #4caf7d;
      --info: #7ea1e0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .dash-header {
      height: 66px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 2.5rem);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .dash-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .dash-brand img {
      width: 34px; height: 34px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--gold);
    }
    .dash-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .dash-brand-tag {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-left: 8px;
      padding: 3px 10px; border: 1px solid var(--border-h); border-radius: 20px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .admin-email { font-size: 0.78rem; color: var(--muted); display: none; }
    .nav-btn-outline {
      background: transparent; border: 1px solid var(--border-h); color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-btn-outline:hover { color: var(--text); border-color: var(--muted); }
    .sidebar-toggler {
      display: none; background: none;
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    /* ── LAYOUT ── */
    .dashboard { display: flex; min-height: calc(100vh - 66px); }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 14px;
    }
    .sidebar a {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); text-decoration: none;
      padding: 11px 16px; margin-bottom: 4px;
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 400;
      transition: all 0.2s;
    }
    .sidebar a i { width: 16px; text-align: center; font-size: 0.85rem; }
    .sidebar a:hover { background: var(--surface2); color: var(--text); }
    .sidebar a.active {
      background: rgba(201,169,110,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.25);
    }

    .main-content { flex: 1; padding: 40px clamp(1.5rem, 4vw, 3rem); }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
    }
    .page-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--gold); opacity: 0.5; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 700; color: var(--text);
      margin-bottom: 20px;
    }

    #responseMessage {
      min-height: 22px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 20px;
    }
    #responseMessage.success { color: var(--success); }
    #responseMessage.error   { color: var(--danger); }

    /* ── PRODUCT ROWS ── */
    .product-list { display: flex; flex-direction: column; gap: 16px; }
    .product-row {
      display: flex; gap: 20px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: border-color 0.25s;
    }
    .product-row:hover { border-color: var(--border-h); }
    .product-row img {
      width: 76px; height: 76px;
      object-fit: cover; border-radius: 10px;
      border: 1px solid var(--border-h);
      flex-shrink: 0;
    }
    .product-details { flex: 1; min-width: 0; }
    .product-details h6 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 700;
      color: var(--text); margin-bottom: 6px;
    }
    .product-meta {
      display: flex; flex-wrap: wrap; gap: 4px 16px;
      font-size: 0.82rem; color: var(--muted);
      margin-bottom: 14px;
    }
    .product-meta strong { color: var(--text); font-weight: 500; }

    .form-actions {
      display: flex; flex-wrap: wrap; align-items: end; gap: 14px;
    }
    .inline-field { display: flex; flex-direction: column; gap: 6px; }
    .inline-field label {
      font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted);
    }
    .inline-field input {
      width: 110px;
      background: var(--surface2);
      border: 1px solid var(--border-h);
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }
    .inline-field input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,0.1); }

    .row-btn {
      border: none; border-radius: 7px;
      padding: 9px 16px;
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .row-btn.save { background: var(--gold); color: #080808; }
    .row-btn.save:hover { background: var(--gold-l); }
    .row-btn.edit { background: transparent; border: 1px solid var(--border-h); color: var(--muted); }
    .row-btn.edit:hover { color: var(--text); border-color: var(--muted); }
    .row-btn.delete { background: transparent; border: 1px solid rgba(224,85,85,0.35); color: var(--danger); }
    .row-btn.delete:hover { background: rgba(224,85,85,0.1); border-color: var(--danger); }
    .row-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── SKELETON / EMPTY / ERROR ── */
    .skeleton-row {
      height: 110px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
    }
    .state-block {
      text-align: center; padding: 60px 2rem;
      border: 1px dashed var(--border-h); border-radius: 12px;
    }
    .state-icon {
      width: 48px; height: 48px; margin: 0 auto 16px;
      border: 1px solid rgba(201,169,110,0.25); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.1rem;
    }
    .state-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 6px;
    }
    .state-desc { font-size: 0.83rem; color: var(--muted); font-weight: 300; }

    @media (max-width: 900px) {
      .sidebar { position: fixed; top: 66px; left: 0; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform 0.25s; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggler { display: flex; }
      .main-content { padding: 28px 1.25rem; }
    }
    @media (max-width: 600px) {
      .product-row { flex-direction: column; }
      .inline-field input { width: 100%; }
      .form-actions { flex-direction: column; align-items: stretch; }
      .row-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="dash-header">
    <a class="dash-brand" href="2_homepage.html">
      <img src="http://localhost:8000/photos/logo.jpg" alt="Cartinix" />
      <span class="dash-brand-name">Cartinix</span>
      <span class="dash-brand-tag">Admin</span>
    </a>
    <div class="header-right">
      <span class="admin-email" id="adminEmailLabel"></span>
      <button class="sidebar-toggler" id="sidebarToggler" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <button class="nav-btn-outline" id="logout">Logout</button>
    </div>
  </div>

  <div class="dashboard">

    <div class="sidebar" id="sidebar">
      <a href="11_admin.html"><i class="fas fa-gauge"></i> Dashboard</a>
      <a href="13_manageproduct.html" class="active"><i class="fas fa-boxes-stacked"></i> Manage Products</a>
      <a href="12_addproduct.html"><i class="fas fa-circle-plus"></i> Add Product</a>
      <a href="15_showorders.html"><i class="fas fa-receipt"></i> Check Orders</a>
      <a href="16_manageorder.html"><i class="fas fa-truck-fast"></i> Manage Orders</a>
      <a href="19_myincome.html"><i class="fas fa-sack-dollar"></i> My Income</a>
    </div>

    <div class="main-content">
      <div class="page-eyebrow">Inventory</div>
      <div class="page-title">Manage Products</div>

      <div id="responseMessage"></div>

      <div class="product-list" id="productContainer">
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>
    </div>

  </div>

  <script>
    // ── Admin auth guard ──
    const adminEmail = localStorage.getItem("adminEmail");
    if (!adminEmail) {
      window.location.href = "1_Signin.html";
    } else {
      const label = document.getElementById("adminEmailLabel");
      label.textContent = adminEmail;
      label.style.display = "inline";
    }

    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("adminEmail");
      window.location.href = "2_homepage.html";
    });

    document.getElementById("sidebarToggler").addEventListener("click", () => {
      document.getElementById("sidebar").classList.toggle("open");
    });

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    const content = document.getElementById("productContainer");
    const msg = document.getElementById("responseMessage");

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = type;
      document.querySelector(".main-content").scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderState({ icon, title, desc, error = false }) {
      content.innerHTML = `
        <div class="state-block ${error ? "error" : ""}">
          <div class="state-icon"><i class="fas ${icon}"></i></div>
          <div class="state-title">${title}</div>
          <div class="state-desc">${desc}</div>
        </div>
      `;
    }

    fetch("http://localhost:8000/admin/details")
      .then(async res => {
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.err || data.Error || "Error fetching products.");
        return data;
      })
      .then(data => {
        if (!data || !data.length) {
          renderState({
            icon: "fa-box-open",
            title: "No products listed yet",
            desc: "Add your first watch from the Add Product page."
          });
          return;
        }

        content.innerHTML = "";
        data.forEach(product => {
          const row = document.createElement("div");
          row.className = "product-row";
          row.innerHTML = `
            <img src="http://localhost:8000/photos/${product.image_path}" alt="${escapeHtml(product.title)}" loading="lazy" />
            <div class="product-details">
              <h6>${escapeHtml(product.title)}</h6>
              <div class="product-meta">
                <span><strong>Brand:</strong> ${escapeHtml(product.brand)}</span>
                <span><strong>Price:</strong> Rs ${Number(product.price).toLocaleString()}</span>
                <span><strong>Qty:</strong> ${product.stock}</span>
              </div>
              <div class="form-actions">
                <div class="inline-field">
                  <label>Stock</label>
                  <input class="stock-input" type="number" min="0" placeholder="${product.stock}" />
                </div>
                <div class="inline-field">
                  <label>Price</label>
                  <input class="price-input" type="number" min="0" step="0.01" placeholder="${product.price}" />
                </div>
                <button class="row-btn save" data-sku="${product.sku}">Save</button>
                <button class="row-btn edit" data-sku="${product.sku}">Edit</button>
                <button class="row-btn delete" data-sku="${product.sku}">Delete</button>
              </div>
            </div>
          `;

          const stockInput = row.querySelector(".stock-input");
          const priceInput = row.querySelector(".price-input");
          const saveBtn = row.querySelector(".save");
          const deleteBtn = row.querySelector(".delete");
          const editBtn = row.querySelector(".edit");

          saveBtn.addEventListener("click", async () => {
            const sku = saveBtn.dataset.sku;
            const stockVal = stockInput.value.trim();
            const priceVal = priceInput.value.trim();

            if (!stockVal && !priceVal) {
              showMsg("Enter a new stock or price value first.", "error");
              return;
            }

            const payload = { sku };
            if (stockVal !== "") payload.stock = parseInt(stockVal, 10);
            if (priceVal !== "") payload.price = parseFloat(priceVal);

            saveBtn.disabled = true;
            saveBtn.textContent = "Saving...";

            try {
              const res = await fetch("http://localhost:8000/admin/price&stock", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });
              const data = await res.json().catch(() => ({}));
              if (!res.ok) throw new Error(data.Error || data.message || "Failed to update.");

              showMsg(data.message || "Product updated.", "success");
              setTimeout(() => window.location.reload(), 1200);
            } catch (err) {
              showMsg(err.message, "error");
              saveBtn.disabled = false;
              saveBtn.textContent = "Save";
            }
          });

          editBtn.addEventListener("click", () => {
            localStorage.setItem("productid", editBtn.dataset.sku);
            window.location.href = "14_editproduct.html";
          });

          deleteBtn.addEventListener("click", async () => {
            if (!confirm("Delete this product? This cannot be undone.")) return;

            const productid = deleteBtn.dataset.sku;
            deleteBtn.disabled = true;
            deleteBtn.textContent = "Deleting...";

            try {
              const res = await fetch("http://localhost:8000/admin/delete", {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ productid }),
              });
              const data = await res.json().catch(() => ({}));
              if (!res.ok) throw new Error(data.Error || data.message || "Failed to delete.");

              showMsg(data.message || "Product deleted.", "success");
              row.remove();
            } catch (err) {
              showMsg(err.message, "error");
              deleteBtn.disabled = false;
              deleteBtn.textContent = "Delete";
            }
          });

          content.appendChild(row);
        });
      })
      .catch(err => {
        renderState({
          icon: "fa-triangle-exclamation",
          title: "Something went wrong",
          desc: err.message || "Please try again in a moment.",
          error: true
        });
      });
  </script>

</body>
</html>
